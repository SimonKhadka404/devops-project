version: '3.8'

services:
  # PostgreSQL database service
  db-service:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot backend
  backend-api:
    build: ./java-application/students/
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db-service
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - private-net
    depends_on:
      db-service:
        condition: service_healthy

  # React frontend
  frontend-service:
    build: ./my-react-app/
    container_name: react_frontend
    ports:
      - "9090:80"
    networks:
      - private-net

# Docker network
networks:
  private-net:
    driver: bridge

# Docker volume for PostgreSQL persistence
volumes:
  postgres_data:
